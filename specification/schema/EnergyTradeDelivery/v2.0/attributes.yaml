openapi: 3.1.1
info:
  title: EnergyTradeDelivery — Performance / Fulfillment Attributes (v2.0)
  version: 2.0.0
  description: >
    Fulfillment attributes for energy trade deliveries. Attached to
    Performance.performanceAttributes (or fulfillmentAttributes for catalog
    flows) to track physical transfer of energy including delivery status,
    meter readings, allocation breakdowns, and settlement data.
    consumedEnergy = energy TO customer (imported);
    producedEnergy = energy FROM customer (exported to grid).

components:
  schemas:
    EnergyTradeDelivery:
      type: object
      additionalProperties: true
      x-tags:
        - energy-trade
        - p2p-trading
        - fulfillment
        - delivery
      x-jsonld:
        "@context": ./context.jsonld
        "@type": EnergyTradeDelivery
      properties:

        deliveryStatus:
          type: string
          enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED]
          description: Delivery status for the energy transfer.
          example: "IN_PROGRESS"
          x-jsonld:
            "@id": deliveryStatus

        deliveryMode:
          type: string
          enum: [EV_CHARGING, BATTERY_SWAP, V2G, GRID_INJECTION]
          description: Mode of energy delivery for this fulfillment.
          example: "GRID_INJECTION"
          x-jsonld:
            "@id": deliveryMode

        deliveryWindow:
          type: object
          additionalProperties: true
          description: >
            Settlement delivery window (UTC, ISO 8601 with Z suffix).
          x-jsonld:
            "@id": deliveryWindow

        deliveredQuantity:
          type: number
          minimum: 0
          description: Total quantity delivered so far in kilowatt-hours (kWh).
          example: 15.0
          x-jsonld:
            "@id": deliveredQuantity

        buyerSideAllocationKwh:
          type: number
          minimum: 0
          description: >
            Energy attributed to the buyer's discom ledger after settlement
            reconciliation (kWh).
          x-jsonld:
            "@id": buyerSideAllocationKwh

        sellerSideAllocationKwh:
          type: number
          minimum: 0
          description: >
            Energy attributed to the seller's discom ledger after settlement
            reconciliation (kWh).
          x-jsonld:
            "@id": sellerSideAllocationKwh

        settledQuantityKwh:
          type: number
          minimum: 0
          description: >
            Final settled quantity used for revenue-flow computation (kWh).
          x-jsonld:
            "@id": settledQuantityKwh

        meterReadings:
          type: array
          description: >
            Array of meter readings for this delivery. Each reading covers a
            time window and reports energy delivered/received during that
            period. Times are in UTC (ISO 8601 with Z suffix).
          items:
            type: object
            additionalProperties: true
            properties:
              "beckn:timeWindow":
                type: object
                additionalProperties: true
              consumedEnergy:
                type: number
                minimum: 0
              producedEnergy:
                type: number
                minimum: 0
              allocatedEnergy:
                type: number
                minimum: 0
              unit:
                type: string
                enum: ["kWh", "MWh", "Wh"]
                default: "kWh"
          x-jsonld:
            "@id": meterReadings

        curtailedQuantity:
          type: number
          minimum: 0
          description: >
            Quantity curtailed from original contracted amount (kWh). Used
            by BAP/BPP to reconcile payment vs. original contracted quantity.
          example: 5.0
          x-jsonld:
            "@id": curtailedQuantity

        curtailmentReason:
          type: string
          enum: [GRID_OUTAGE, EMERGENCY, CONGESTION, MAINTENANCE, OTHER]
          description: >
            Reason for curtailment. Useful for audit trail and dispute
            resolution.
          example: "GRID_OUTAGE"
          x-jsonld:
            "@id": curtailmentReason

        lastUpdated:
          type: string
          format: date-time
          description: >
            Last delivery update timestamp in UTC (ISO 8601 with Z suffix).
          example: "2024-10-04T15:30:00Z"
          x-jsonld:
            "@id": "schema:dateModified"
