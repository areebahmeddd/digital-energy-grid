arazzo: 1.0.1
info:
  title: P2P Trading (Wave 2) Workflow
  version: 1.0.0
  description: >
    End-to-end Beckn 2.0 LTS workflow for inter-discom Peer-to-Peer energy
    trading. Scenario: a prosumer on TPDDL (seller) publishes a 1-hour solar
    slot; a prosumer on BRPL (buyer) selects, optionally pre-checks discom
    headroom, confirms, and settles after meter-data reconciliation. The
    contract names four roles — buyer, seller, buyerDiscom, sellerDiscom —
    and the linked rego computes net revenueFlows (wheeling/penalty charges
    are placeholder zeros today; the structure is ready for real tariff
    rules).

    Run with Redocly respect (from p2p-trading-ies-wave2/):

      Run all workflows:
        npx @redocly/cli respect workflows/p2p-trading-ies-wave2.arazzo.yaml \
          --severity 'SCHEMA_CHECK=off' -v

      Run a single workflow:
        npx @redocly/cli respect workflows/p2p-trading-ies-wave2.arazzo.yaml \
          -w select-through-settlement --severity 'SCHEMA_CHECK=off' -v

      Available workflows: publish-catalog, discover, select-through-settlement

      Override server URLs (optional, defaults in x-serverUrl):
        -S beckn-bap-caller=http://localhost:8081/bap/caller \
        -S beckn-bpp-caller=http://localhost:8082/bpp/caller

sourceDescriptions:
  - name: beckn-bap-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8081/bap/caller

  - name: beckn-bpp-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8082/bpp/caller

workflows:
  # ── Catalog & Discovery ──

  - workflowId: publish-catalog
    summary: Seller TP publishes a P2P solar offer with delivery window and price terms
    steps:
      - stepId: publish-catalog
        description: BPP publishes EnergyResource + EnergyTradeOffer catalog
        operationId: beckn-bpp-caller.catalogPublish
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/publish-catalog.json"

  - workflowId: discover
    summary: Buyer TP discovers available P2P solar offers via discover service
    steps:
      - stepId: discover
        description: BAP discovers PER_KWH EnergyTradeOffer entries on the network
        operationId: beckn-bap-caller.discover
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/discover-request.json"

  # ── Contract lifecycle: select → optional discom check → confirm → settlement ──

  - workflowId: select-through-settlement
    summary: Buyer selects, optionally pre-checks discom headroom, confirms, and settles
    steps:
      - stepId: select
        description: Buyer TP selects 20 kWh from the 30 kWh offer
        operationId: beckn-bap-caller.select
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/select-request.json"

      - stepId: on-select
        description: Seller TP returns DRAFT contract with seller-side terms bound
        operationId: beckn-bpp-caller.onSelect
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-select-response.json"

      - stepId: init
        description: Buyer TP provides buyer-side identity (meter, utility, customer ID)
        operationId: beckn-bap-caller.init
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/init-request.json"

      - stepId: discom-init
        description: >
          OPTIONAL — Phase 2 discom-ledger limit check. Buyer TP and Seller TP
          ask their respective discom ledgers to confirm contract qty fits
          within the prosumer's allocation envelope for the delivery window.
        operationId: beckn-bap-caller.init
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/init-request-discom.json"

      - stepId: discom-on-init
        description: >
          OPTIONAL — Both discom ledgers respond OK with remaining headroom.
          Final-adjustment logic (per spec) is intentionally omitted in this devkit.
        operationId: beckn-bpp-caller.onInit
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-init-response-discom.json"

      - stepId: on-init
        description: Seller TP acknowledges buyer-side identity (DRAFT)
        operationId: beckn-bpp-caller.onInit
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-init-response.json"

      - stepId: confirm
        description: Buyer TP confirms the P2P trade contract
        operationId: beckn-bap-caller.confirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/confirm-request.json"

      - stepId: on-confirm
        description: Seller TP confirms contract is ACTIVE — both TPs log in their discom ledgers (off-band)
        operationId: beckn-bpp-caller.onConfirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-confirm-response.json"

      - stepId: on-status-settled
        description: >
          Phase 5 — after physical delivery and discom-ledger reconciliation,
          Seller TP reports allocations + settled qty. The revenueflows
          middleware evaluates the linked rego and emits revenueFlows summing
          to zero across buyer/seller/buyerDiscom/sellerDiscom (wheeling and
          penalty charges are 0 today).
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-settled.json"
