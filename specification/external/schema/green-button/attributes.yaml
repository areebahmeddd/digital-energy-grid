openapi: 3.1.1
info:
  title: Green Button / ESPI Types
  version: 1.0.0
  description: >
    Minimal OpenAPI 3.1.1 conversion of Green Button (ESPI/NAESB) types used
    by energy credentials.  Human-readable string enum values are used instead
    of ESPI integer codes; the original codes are noted in descriptions for
    traceability.  ISO 8601 datetimes replace epoch seconds.

components:
  schemas:

    # ── Enumerations ──────────────────────────────────────────────

    ServiceKind:
      type: string
      description: >
        Kind of service provided (ESPI: ServiceKind).
        ESPI codes — 0: electricity, 1: gas, 2: water.
      enum:
        - electricity
        - gas
        - water

    CommodityKind:
      type: string
      description: >
        Commodity being metered (ESPI: CommodityKind).
        ESPI codes — 0: none, 1: electricitySecondaryMetered,
        2: electricityPrimaryMetered, 4: air, 7: naturalGas, 8: propane,
        9: potableWater, 10: steam, 11: wasteWater.
      enum:
        - none
        - electricitySecondaryMetered
        - electricityPrimaryMetered
        - air
        - naturalGas
        - propane
        - potableWater
        - steam
        - wasteWater

    FlowDirectionKind:
      type: string
      description: >
        Direction of energy flow being measured (ESPI: FlowDirectionKind).
        ESPI codes — 0: none, 1: forward, 2: lagging, 3: leading,
        4: net, 5: q1plusQ2, 19: reverse.
      enum:
        - none
        - forward
        - reverse
        - net
        - lagging
        - leading

    UnitOfMeasure:
      type: string
      description: >
        Unit of measure for the reading (ESPI: UnitOfMeasure / UOM).
        ESPI codes — 5: A (current), 29: V (voltage), 31: J,
        33: Hz, 38: W (real power), 42: m3, 61: VA, 63: VAr,
        71: Wh (real energy), 72: kWh.
      enum:
        - Wh
        - kWh
        - W
        - kW
        - VA
        - VAr
        - V
        - A
        - Hz
        - J
        - m3

    AccumulationBehaviourKind:
      type: string
      description: >
        How the reading value accumulates over time
        (ESPI: AccumulationBehaviourKind).
        ESPI codes — 0: none, 1: bulkQuantity, 2: continuousCumulative,
        3: cumulative, 4: deltaData, 6: indicating, 9: summation,
        12: instantaneous.
      enum:
        - none
        - bulkQuantity
        - continuousCumulative
        - cumulative
        - deltaData
        - indicating
        - summation
        - instantaneous

    # ── Data Structures ───────────────────────────────────────────

    DateTimeInterval:
      type: object
      description: >
        A time interval defined by a start timestamp and a duration in seconds
        (ESPI: DateTimeInterval).  Uses ISO 8601 for the start instant.
      required:
        - start
        - duration
      properties:
        start:
          type: string
          format: date-time
          description: Start of the interval (ISO 8601)
        duration:
          type: integer
          minimum: 0
          description: Duration of the interval in seconds

    ReadingType:
      type: object
      description: >
        Describes what is being measured (ESPI: ReadingType).
        Each field maps to a Green Button ReadingType sub-element.
      required:
        - commodity
        - flowDirection
        - uom
        - powerOfTenMultiplier
        - accumulationBehaviour
        - intervalLength
      properties:
        commodity:
          $ref: '#/components/schemas/CommodityKind'
        flowDirection:
          $ref: '#/components/schemas/FlowDirectionKind'
        uom:
          $ref: '#/components/schemas/UnitOfMeasure'
        powerOfTenMultiplier:
          type: integer
          description: >
            Power-of-ten multiplier applied to the reading value
            (ESPI: UnitMultiplierKind).
            E.g., 0 = ×1, 3 = ×1000 (kilo), -3 = ×0.001 (milli).
        accumulationBehaviour:
          $ref: '#/components/schemas/AccumulationBehaviourKind'
        intervalLength:
          type: integer
          minimum: 1
          description: >
            Standard interval length in seconds for the readings
            (e.g., 900 for 15-minute intervals).

    IntervalReading:
      type: object
      description: >
        A single metered reading within a block (ESPI: IntervalReading).
      required:
        - timePeriod
        - value
      properties:
        timePeriod:
          $ref: '#/components/schemas/DateTimeInterval'
        value:
          type: integer
          description: >
            Raw reading value.  Multiply by 10^powerOfTenMultiplier and
            apply the UOM from ReadingType to get the physical quantity.

    IntervalBlock:
      type: object
      description: >
        A contiguous block of interval readings (ESPI: IntervalBlock).
      required:
        - interval
        - intervalReadings
      properties:
        interval:
          $ref: '#/components/schemas/DateTimeInterval'
        intervalReadings:
          type: array
          items:
            $ref: '#/components/schemas/IntervalReading'
          minItems: 1
