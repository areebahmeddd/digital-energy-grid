appName: "onix-local"
log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transaction_id
    - message_id
    - subscriber_id
    - module_id
http:
  port: 8082
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins
modules:
  - name: bppTxnReceiver
    path: /bpp/receiver/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "nfh.global/testnet-deg"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: bpp.example.com
            keyId: 76EU7ofwRCF1aobQkShARrf1PAUsNpHqWUJoynPu9w45YFKmzqaPmy
            signingPrivateKey: 393fVJJsfqssJCRAjedKR2cKAjSLrjU3t+bICQ5KzYM=
            signingPublicKey: CqVy97DW45bcZPPrWIYGe2ldl9C93NFeVciiAEYsvR0=
            encrPrivateKey: 393fVJJsfqssJCRAjedKR2cKAjSLrjU3t+bICQ5KzYM=
            encrPublicKey: CqVy97DW45bcZPPrWIYGe2ldl9C93NFeVciiAEYsvR0=
        schemaValidator:
          id: schemav2validator
          config:
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.nfh.global"
        checkPolicy:
          id: opapolicychecker
          config:
            networkPolicyConfig: ./config/opa-network-policies.yaml
            refreshInterval: "5m"
        cache:
          id: cache
          config:
            addr: redis:6379
        signValidator:
          id: signvalidator
        router:
          id: router
          config:
            routingConfig: ./config/local-demand-flex-routing-BPP-Receiver.yaml
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bpp
      steps:
        - validateSign
        - checkPolicy
        - addRoute
        - validateSchema

  - name: bppTxnCaller
    path: /bpp/caller/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        registry:
          id: dediregistry
          config:
            registryName: subscribers.beckn.one
            allowedNetworkIDs: "nfh.global/testnet-deg"
            timeout: 10
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: bpp.example.com
            keyId: 76EU7ofwRCF1aobQkShARrf1PAUsNpHqWUJoynPu9w45YFKmzqaPmy
            signingPrivateKey: 393fVJJsfqssJCRAjedKR2cKAjSLrjU3t+bICQ5KzYM=
            signingPublicKey: CqVy97DW45bcZPPrWIYGe2ldl9C93NFeVciiAEYsvR0=
            encrPrivateKey: 393fVJJsfqssJCRAjedKR2cKAjSLrjU3t+bICQ5KzYM=
            encrPublicKey: CqVy97DW45bcZPPrWIYGe2ldl9C93NFeVciiAEYsvR0=
        schemaValidator:
          id: schemav2validator
          config:
            cacheTTL: "3600"
            extendedSchema_enabled: "true"
            extendedSchema_cacheTTL: "86400"
            extendedSchema_maxCacheSize: "100"
            extendedSchema_downloadTimeout: "30"
            extendedSchema_allowedDomains: "raw.githubusercontent.com,schema.nfh.global"
        checkPolicy:
          id: opapolicychecker
          config:
            networkPolicyConfig: ./config/opa-network-policies.yaml
            refreshInterval: "5m"
        cache:
          id: cache
          config:
            addr: redis:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-demand-flex-routing-BPP-Caller.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bpp
        steps:
          # First step: injects settlement flows so validateSchema sees the
          # enriched payload and sign signs it.
          - id: contractpolicyenforcer
            config:
              actions: "on_status"
              # Injection-only instance: violations are logged, never NACKed.
              violationActions: ""
              debugLogging: "true"
              allowedPolicyUrlPrefixes: "https://raw.githubusercontent.com/beckn/DEG/"
              # Wave2-style: rego output is wrapped as a Beckn-native
              # Consideration entry (idempotent on retry via the
              # [id=auto-revenue-flows] selector). The considerationAttributes
              # block carries a JSON-LD-wrapped RevenueFlow object the
              # extended-schema validator picks up via @context.
              outputPath: "message.contract.consideration[id=auto-revenue-flows].considerationAttributes"
              outputMode: "jsonld"
              outputType: "RevenueFlow"
              outputContextURL: "https://schema.nfh.global/RevenueFlow/2.0/context.jsonld"
              outputArrayKey: "revenueFlows"
              entryDefaults: '{"status":{"code":"SETTLED"}}'
      steps:
        - contractpolicyenforcer
        - validateSchema
        - checkPolicy
        - addRoute
        - sign
