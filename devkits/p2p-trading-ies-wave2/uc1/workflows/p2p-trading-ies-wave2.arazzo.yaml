arazzo: 1.0.1
info:
  title: P2P Trading (Wave 2) Workflow
  version: 1.0.0
  description: >
    End-to-end Beckn 2.0 LTS workflow for inter-discom Peer-to-Peer energy
    trading. Scenario: a prosumer on TPDDL (seller) publishes a 1-hour solar
    slot; a prosumer on BRPL (buyer) selects, optionally pre-checks discom
    headroom, confirms, and settles after meter-data reconciliation. The
    contract names four roles — buyer, seller, buyerDiscom, sellerDiscom —
    and the linked rego computes net revenueFlows (wheeling/penalty charges
    are placeholder zeros today; the structure is ready for real tariff
    rules).

    Two ledger round-trip workflows are included:

      status-roundtrip-via-seller: BAP sends status → BPP forwards to seller
        ledger (auto) → ledger returns on_status with performance columns →
        BPP routes on_status to BAP → BAP forwards on_status to buyer ledger (auto).

      status-roundtrip-direct-buyer-ledger: BAP sends status directly to
        buyer ledger (symmetric path A) → ledger returns on_status with
        performance columns → BAP receives on_status.

    Run with Redocly respect (from p2p-trading-ies-wave2/):

      Run all workflows:
        npx @redocly/cli respect workflows/p2p-trading-ies-wave2.arazzo.yaml \
          --severity 'SCHEMA_CHECK=off' -v

      Run a single workflow:
        npx @redocly/cli respect workflows/p2p-trading-ies-wave2.arazzo.yaml \
          -w status-roundtrip-via-seller --severity 'SCHEMA_CHECK=off' -v

      Available workflows: publish-catalog, select-through-settlement,
        status-roundtrip-via-seller, status-roundtrip-direct-buyer-ledger

      Override server URLs (optional, defaults in x-serverUrl):
        -S beckn-bap-caller=http://localhost:8081/bap/caller \
        -S beckn-bpp-caller=http://localhost:8082/bpp/caller \
        -S beckn-ledger-caller=http://localhost:8083/ledger/caller

sourceDescriptions:
  - name: beckn-bap-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8081/bap/caller

  - name: beckn-bpp-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8082/bpp/caller

  - name: beckn-ledger-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8083/ledger/caller

workflows:
  # ── Catalog & Discovery ──

  - workflowId: publish-catalog
    summary: Seller TP publishes a P2P solar offer with delivery window and price terms
    steps:
      - stepId: publish-catalog
        description: BPP publishes EnergyResource + EnergyTradeOffer catalog
        operationId: beckn-bpp-caller.catalogPublish
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/publish-catalog.json"

  - workflowId: discover
    summary: Buyer TP discovers available P2P solar offers via discover service
    steps:
      - stepId: discover
        description: BAP discovers PER_KWH EnergyTradeOffer entries on the network
        operationId: beckn-bap-caller.discover
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/discover-request.json"

  # ── Contract lifecycle: select → optional discom check → confirm → settlement ──

  - workflowId: select-through-settlement
    summary: Buyer selects, optionally pre-checks discom headroom, confirms, and settles
    steps:
      - stepId: init
        description: Buyer TP provides buyer-side identity (meter, utility, customer ID)
        operationId: beckn-bap-caller.init
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/init-request.json"

      - stepId: discom-init
        description: >
          OPTIONAL — Phase 2 discom-ledger limit check. Buyer TP and Seller TP
          ask their respective discom ledgers to confirm contract qty fits
          within the prosumer's allocation envelope for the delivery window.
        operationId: beckn-bap-caller.init
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/init-request-discom.json"

      - stepId: discom-on-init
        description: >
          OPTIONAL — Both discom ledgers respond OK with remaining headroom.
          Final-adjustment logic (per spec) is intentionally omitted in this devkit.
        operationId: beckn-bpp-caller.onInit
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-init-response-discom.json"

      - stepId: on-init
        description: Seller TP acknowledges buyer-side identity (DRAFT)
        operationId: beckn-bpp-caller.onInit
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-init-response.json"

      - stepId: confirm
        description: Buyer TP confirms the P2P trade contract
        operationId: beckn-bap-caller.confirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/confirm-request.json"

      - stepId: on-confirm
        description: Seller TP confirms contract is ACTIVE — both TPs log in their discom ledgers (off-band)
        operationId: beckn-bpp-caller.onConfirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-confirm-response.json"

      - stepId: on-status-settled
        description: >
          Phase 5 — after physical delivery and discom-ledger reconciliation,
          Seller TP reports allocations + settled qty. The revenueflows
          middleware evaluates the linked rego and emits revenueFlows summing
          to zero across buyer/seller/buyerDiscom/sellerDiscom (wheeling and
          penalty charges are 0 today).
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-settled.json"

  # ── Ledger round-trip: status raised by buyer, flows to seller ledger, back to buyer ledger ──

  - workflowId: status-roundtrip-via-seller
    summary: >
      Buyer requests fulfillment status → seller ledger responds with
      performance columns → on_status propagates back to buyer ledger.
      Tests the full automation chain: BPP degledgerrecorder forwards status
      to seller ledger; BAP degledgerrecorder forwards on_status (with
      performance data) to buyer ledger.
    steps:
      - stepId: buyer-sends-status
        description: >
          BAP sends status with full contract participants (including
          sellerDiscom.ledgerUri and buyerDiscom.ledgerUri pointing to the
          local mock onix-ledger). BPP degledgerrecorder will auto-forward to
          seller ledger on receipt.
        operationId: beckn-bap-caller.status
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/status-request.json"

      - stepId: seller-ledger-responds-on-status
        description: >
          Mock seller ledger (sandbox-ledger PERSONA=ledger) returns on_status
          with all five performance columns populated: BUYER_DISCOM_ALLOC,
          SELLER_DISCOM_ALLOC, BUYER_DISCOM_STATUS, SELLER_DISCOM_STATUS,
          FINAL_ALLOC. BPP routes this to BAP; BAP degledgerrecorder then
          auto-forwards on_status to buyer ledger.
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-with-performance.json"

  # ── Ledger round-trip (symmetric path A): buyer sends status directly to buyer ledger ──

  - workflowId: status-roundtrip-direct-buyer-ledger
    summary: >
      BAP sends status directly to buyer ledger (symmetric path A, bypassing
      seller). Buyer ledger returns on_status with performance columns. Tests
      the BAP bapTxnCaller degledgerrecorder forwarding status to buyerDiscom
      ledger.
    steps:
      - stepId: buyer-sends-status-to-buyer-ledger
        description: >
          BAP sends status via bap/caller. degledgerrecorder (BUYER role,
          action=status) intercepts and forwards to buyerDiscom.ledgerUri.
        operationId: beckn-bap-caller.status
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/status-request.json"

      - stepId: buyer-ledger-responds-on-status
        description: >
          Mock buyer ledger returns on_status with performance data. Confirms
          the direct buyer → buyer-ledger path is operational.
        operationId: beckn-ledger-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-with-performance.json"
