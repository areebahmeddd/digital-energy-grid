arazzo: 1.0.1
info:
  title: P2P Trading (Wave 2) Workflow
  version: 1.0.0
  description: >
    End-to-end Beckn 2.0 LTS workflow for inter-discom Peer-to-Peer energy
    trading. Scenario: a prosumer on TPDDL (seller) publishes a 1-hour solar
    slot; a prosumer on BRPL (buyer) selects, confirms, and settles after
    meter-data reconciliation. The contract names four roles — buyer, seller,
    buyerDiscom, sellerDiscom — and the linked rego computes net revenueFlows.

    Per-node hostname design (wave2):
      buyer.beckn-router         — onix-buyerapp (BAP role)
      seller.beckn-router        — onix-sellerapp (BPP role)
      sellerdiscom.beckn-router  — onix-ledger-sellerdiscom (BPP-role discom)
      buyerdiscom.beckn-router   — onix-ledger-buyerdiscom (BAP-role discom, sink)

    Cascade chain (purely plugin-automated):
      buyer/bap/caller  --status-->     seller/bpp/receiver
      seller            --status-->     sellerdiscom/bpp/receiver   (Rule 1)
      sellerdiscom      --on_status-->  seller/bap/receiver
      seller            --on_status-->  buyer/bap/receiver          (Rule 2a)
      buyer             --on_status-->  buyerdiscom/bap/receiver    (Rule 2b)

    Rule 1: /status at /bpp/receiver → cascade to own discom (sellerDiscom.ledgerUri).
    Rule 2: /on_status at /bap/receiver → check context.bppId:
        if it matches own discom's participantId → forward to peer's /bap/receiver,
        else → cascade to own discom's ledgerUri.

    Run with Redocly respect (from p2p-trading-ies-wave2/):

      Run all workflows:
        npx @redocly/cli respect workflows/p2p-trading-ies-wave2.arazzo.yaml \
          --severity 'SCHEMA_CHECK=off' -v

      Run a single workflow:
        npx @redocly/cli respect workflows/p2p-trading-ies-wave2.arazzo.yaml \
          -w status-roundtrip-via-seller-discom --severity 'SCHEMA_CHECK=off' -v

      Available workflows: publish-catalog, select-through-settlement,
        status-roundtrip-via-seller-discom

sourceDescriptions:
  - name: beckn-bap-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8081/bap/caller

  - name: beckn-bpp-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8082/bpp/caller

  - name: beckn-sellerdiscom-bpp-caller
    type: openapi
    url: https://raw.githubusercontent.com/beckn/protocol-specifications-v2/refs/tags/core-v2.0.0-lts/api/v2.0.0/beckn.yaml
    x-serverUrl: http://localhost:8083/bpp/caller

workflows:
  # ── Catalog & Discovery ──

  - workflowId: publish-catalog
    summary: Seller TP publishes a P2P solar offer with delivery window and price terms
    steps:
      - stepId: publish-catalog
        description: BPP publishes EnergyResource + EnergyTradeOffer catalog
        operationId: beckn-bpp-caller.catalogPublish
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/publish-catalog.json"

  - workflowId: discover
    summary: Buyer TP discovers available P2P solar offers via discover service
    steps:
      - stepId: discover
        description: BAP discovers PER_KWH EnergyTradeOffer entries on the network
        operationId: beckn-bap-caller.discover
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/discover-request.json"

  # ── Contract lifecycle: select → confirm → settlement ──

  - workflowId: select-through-settlement
    summary: Buyer selects, confirms, and settles
    steps:
      - stepId: init
        description: Buyer TP provides buyer-side identity (meter, utility, customer ID)
        operationId: beckn-bap-caller.init
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/init-request.json"

      - stepId: on-init
        description: Seller TP acknowledges buyer-side identity (DRAFT)
        operationId: beckn-bpp-caller.onInit
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-init-response.json"

      - stepId: confirm
        description: Buyer TP confirms the P2P trade contract
        operationId: beckn-bap-caller.confirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/confirm-request.json"

      - stepId: on-confirm
        description: Seller TP confirms contract is ACTIVE — both TPs log in their discom ledgers (off-band)
        operationId: beckn-bpp-caller.onConfirm
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-confirm-response.json"

      - stepId: on-status-settled
        description: >
          Phase 5 — after physical delivery and discom-ledger reconciliation,
          Seller TP reports allocations + settled qty. The revenueflows
          middleware evaluates the linked rego and emits revenueFlows.
        operationId: beckn-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/on-status-response-settled.json"

  # ── Status cascade via sellerDiscom ──

  - workflowId: status-roundtrip-via-seller-discom
    summary: >
      Buyer sends /status → seller cascades /status to sellerDiscom (Rule 1) →
      sellerDiscom emits /on_status (simulated by step 2) → seller's /bap/receiver
      forwards to buyer (Rule 2a) → buyer's /bap/receiver cascades to buyerDiscom
      (Rule 2b). All steps return ACK; no fan-out loops; chain is linear.
    steps:
      - stepId: buyer-sends-status
        description: >
          Buyer/bap/caller sends /status to seller/bpp/receiver. Seller's
          degledgerrecorder cascades /status to sellerDiscom/bpp/receiver
          (Rule 1). sellerDiscom mock then asynchronously emits /on_status
          via its /bpp/caller back to seller/bap/receiver, kicking off the
          downstream cascade (Rules 2a → 2b).
        operationId: beckn-bap-caller.status
        requestBody:
          contentType: application/json
          payload:
            $ref: "../examples/status-request.json"

      - stepId: seller-discom-responds-on-status
        description: >
          Explicit synchronous simulation of the sellerDiscom on_status response
          (the async path above does the same thing but timing-dependent).
          Posts to sellerdiscom/bpp/caller, which routes /on_status to
          seller/bap/receiver. The recorder there detects context.bppId
          matches sellerDiscom.participantId (Rule 2a) → forwards to
          buyer/bap/receiver → cascades to buyerDiscom (Rule 2b).
        operationId: beckn-sellerdiscom-bpp-caller.onStatus
        requestBody:
          contentType: application/json
          payload:
            $ref: "../../responses/sellerdiscom/on_status.json"
