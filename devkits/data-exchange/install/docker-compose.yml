# Base stack: BAP and BPP adapter + sandbox services.
#
# This file alone is not runnable — it leaves network topology and redis
# placement to an overlay file:
#
#   Local (shared bridge, direct onix-bap <-> onix-bpp):
#     docker compose up -d
#     # auto-applies docker-compose.override.yml
#
#   Over-internet (split networks + path router, forces public-URL traversal):
#     docker compose -f docker-compose.yml -f docker-compose.over-internet.yml up -d

services:
  onix-bap:
    image: fidedocker/onix-adapter:1.5.1
    platform: linux/amd64
    ports:
      - "8081:8081"
    environment:
      CONFIG_FILE: "/app/config/local-simple-bap.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
    volumes:
      - ../config:/app/config
      - ../schemas:/app/schemas
    command: ["./server", "--config=/app/config/local-simple-bap.yaml"]

  onix-bpp:
    image: fidedocker/onix-adapter:1.5.1
    platform: linux/amd64
    ports:
      - "8082:8082"
    environment:
      CONFIG_FILE: "/app/config/local-simple-bpp.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
    volumes:
      - ../config:/app/config
      - ../schemas:/app/schemas
    command: ["./server", "--config=/app/config/local-simple-bpp.yaml"]

  sandbox-bap:
    image: fidedocker/sandbox-2.0:latest
    environment:
      - NODE_ENV=production
      - PORT=3001
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  sandbox-bpp:
    image: fidedocker/sandbox-2.0:latest
    environment:
      - NODE_ENV=production
      - PORT=3002
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
