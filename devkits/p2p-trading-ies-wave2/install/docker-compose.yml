# P2P Trading (wave2) devkit stack.
#
# BAP-side and BPP-side services live on separate, mutually unreachable
# docker networks (bap_side, bpp_side). Each side has its own redis
# (aliased as `redis` inside its network). The beckn-router (Caddy) is the
# ONLY container with a foot in both networks; it accepts traffic on :9000
# and routes /bap/* and /bpp/* to the respective onix adapter on its own side.
#
# Split discom design (wave2):
#   onix-ledger-sellerdiscom (8083) + sandbox-ledger-sellerdiscom (3003) live on bpp_side.
#   onix-ledger-buyerdiscom  (8084) + sandbox-ledger-buyerdiscom  (3004) live on bap_side.
#   beckn-router exposes /ledger-sellerdiscom/* and /ledger-buyerdiscom/* to bridge both sides.
#
# Run full stack:
#   docker compose up -d
#
# Expose the router to the public internet: copy ngrok.yml.example to
# ngrok.yml, paste your authtoken, then:
#   ngrok start --all --config ngrok.yml
# Point workflows at the tunnel URL (forces real internet traversal):
#   PUBLIC_URL=https://<host>.ngrok-free.dev ./run-arazzo.sh

services:
  # ---------- BAP side ----------
  redis-bap:
    image: redis:alpine
    hostname: redis
    container_name: redis-bap
    networks:
      - bap_side
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  onix-buyerapp:
    image: fidedocker/onix-adapter-deg:v2
    container_name: onix-buyerapp
    ports:
      - "8081:8081"
    environment:
      CONFIG_FILE: "/app/config/local-p2p-trading-buyerapp.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector-buyerapp:4317
    volumes:
      - ../config:/app/config
      - ../schemas:/app/schemas
      - ../policies:/app/policies
    command: ["./server", "--config=/app/config/local-p2p-trading-buyerapp.yaml"]
    networks:
      - bap_side
    depends_on:
      otel-collector-buyerapp:
        condition: service_started

  sandbox-buyerapp:
    container_name: sandbox-buyerapp
    image: fidedocker/sandbox-2.0:latest
    platform: linux/amd64
    environment:
      - NODE_ENV=production
      - PORT=3001
    ports:
      - "3001:3001"
    volumes:
      - ./sandbox-ack-status-route.js:/startup/sandbox-ack-status-route.js:ro
    command: ["sh", "-c", "node /startup/sandbox-ack-status-route.js && npm start"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bap_side

  # ---------- BPP side ----------
  redis-bpp:
    image: redis:alpine
    hostname: redis
    container_name: redis-bpp
    networks:
      - bpp_side
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  onix-sellerapp:
    image: fidedocker/onix-adapter-deg:v2
    container_name: onix-sellerapp
    ports:
      - "8082:8082"
    environment:
      CONFIG_FILE: "/app/config/local-p2p-trading-sellerapp.yaml"
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root
      REDIS_ADDR: redis:6379
      RABBITMQ_ADDR: rabbitmq:5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin123
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector-sellerapp:4317
    volumes:
      - ../config:/app/config
      - ../schemas:/app/schemas
      - ../policies:/app/policies
    command: ["./server", "--config=/app/config/local-p2p-trading-sellerapp.yaml"]
    networks:
      - bpp_side
    depends_on:
      otel-collector-sellerapp:
        condition: service_started

  sandbox-sellerapp:
    container_name: sandbox-sellerapp
    image: fidedocker/sandbox-2.0:latest
    platform: linux/amd64
    environment:
      - NODE_ENV=production
      - PORT=3002
      - PERSONA=bpp
    ports:
      - "3002:3002"
    volumes:
      - ./sandbox-ack-status-route.js:/startup/sandbox-ack-status-route.js:ro
    command: ["sh", "-c", "node /startup/sandbox-ack-status-route.js && npm start"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bpp_side

  # ---------- Seller Discom Ledger (BPP side) ----------
  redis-ledger:
    image: redis:alpine
    hostname: redis-ledger
    container_name: redis-ledger
    networks:
      - bap_side
      - bpp_side
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  onix-ledger-sellerdiscom:
    image: fidedocker/onix-adapter-deg:v2
    container_name: onix-ledger-sellerdiscom
    ports:
      - "8083:8083"
    environment:
      CONFIG_FILE: "/app/config/local-p2p-trading-ledger-sellerdiscom.yaml"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector-ledger-sellerdiscom:4317
    volumes:
      - ../config:/app/config
      - ../schemas:/app/schemas
      - ../policies:/app/policies
    command: ["./server", "--config=/app/config/local-p2p-trading-ledger-sellerdiscom.yaml"]
    networks:
      - bpp_side
    depends_on:
      redis-ledger:
        condition: service_healthy
      otel-collector-ledger-sellerdiscom:
        condition: service_started

  sandbox-ledger-sellerdiscom:
    container_name: sandbox-ledger-sellerdiscom
    image: fidedocker/sandbox-2.0:latest
    platform: linux/amd64
    environment:
      - NODE_ENV=production
      - PORT=3003
      - PERSONA=ledger
      # Route on_status callback through onix-ledger-sellerdiscom caller so it
      # is signed before forwarding to the BPP receiver (targetType: bpp).
      - BPP_CALLBACK_ENDPOINT=http://onix-ledger-sellerdiscom:8083/bpp/caller
    ports:
      - "3003:3003"
    volumes:
      - ../responses/sellerdiscom:/app/dist/webhook/jsons/nfh.global/testnet-deg/response/ledger
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bpp_side

  # ---------- Buyer Discom Ledger (BAP side) ----------
  onix-ledger-buyerdiscom:
    image: fidedocker/onix-adapter-deg:v2
    container_name: onix-ledger-buyerdiscom
    ports:
      - "8084:8084"
    environment:
      CONFIG_FILE: "/app/config/local-p2p-trading-ledger-buyerdiscom.yaml"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector-ledger-buyerdiscom:4317
    volumes:
      - ../config:/app/config
      - ../schemas:/app/schemas
      - ../policies:/app/policies
    command: ["./server", "--config=/app/config/local-p2p-trading-ledger-buyerdiscom.yaml"]
    networks:
      - bap_side
    depends_on:
      redis-ledger:
        condition: service_healthy
      otel-collector-ledger-buyerdiscom:
        condition: service_started

  sandbox-ledger-buyerdiscom:
    container_name: sandbox-ledger-buyerdiscom
    image: fidedocker/sandbox-2.0:latest
    platform: linux/amd64
    environment:
      - NODE_ENV=production
      - PORT=3004
      - PERSONA=ledger
      # buyerdiscom is a terminal sink in the wave2 chain (BAP role: only
      # receives /on_status); no callback is fired so this env var is unset.
    ports:
      - "3004:3004"
    volumes:
      - ../responses/buyerdiscom:/app/dist/webhook/jsons/nfh.global/testnet-deg/response/ledger
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - bap_side

  # ---------- Buyer Discom Actor (the utility itself, distinct from the
  #            buyer-discom-ledger TSP). Symmetric counterpart to the seller
  #            discom actor. Lives on the BAP side so it can reach
  #            buyer-discom-ledger directly via docker DNS / network alias. ----------
  redis-buyerdiscom:
    image: redis:alpine
    hostname: redis-buyerdiscom
    container_name: redis-buyerdiscom
    networks:
      - bap_side
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  onix-buyerdiscom:
    image: fidedocker/onix-adapter-deg:v2
    container_name: onix-buyerdiscom
    ports:
      - "8085:8085"
    environment:
      CONFIG_FILE: "/app/config/local-p2p-trading-buyerdiscom.yaml"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector-buyerdiscom:4317
    volumes:
      - ../config:/app/config
      - ../schemas:/app/schemas
      - ../policies:/app/policies
    command: ["./server", "--config=/app/config/local-p2p-trading-buyerdiscom.yaml"]
    networks:
      - bap_side
    depends_on:
      redis-buyerdiscom:
        condition: service_healthy
      otel-collector-buyerdiscom:
        condition: service_started

  # ---------- Seller Discom Actor (the utility itself, distinct from the
  #            seller-discom-ledger TSP). New Beckn-native replacement for
  #            the bespoke /ledger/allocate REST push. Lives on the BPP
  #            side so it can reach seller-discom-ledger directly via
  #            docker DNS / network alias. ----------
  redis-sellerdiscom:
    image: redis:alpine
    hostname: redis-sellerdiscom
    container_name: redis-sellerdiscom
    networks:
      - bpp_side
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  onix-sellerdiscom:
    image: fidedocker/onix-adapter-deg:v2
    container_name: onix-sellerdiscom
    ports:
      - "8086:8086"
    environment:
      CONFIG_FILE: "/app/config/local-p2p-trading-sellerdiscom.yaml"
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector-sellerdiscom:4317
    volumes:
      - ../config:/app/config
      - ../schemas:/app/schemas
      - ../policies:/app/policies
    command: ["./server", "--config=/app/config/local-p2p-trading-sellerdiscom.yaml"]
    networks:
      - bpp_side
    depends_on:
      redis-sellerdiscom:
        condition: service_healthy
      otel-collector-sellerdiscom:
        condition: service_started

  # ---------- Observability ----------
  otel-collector-buyerapp:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-buyerapp
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      OTEL_NODE_NAME: buyerapp
    volumes:
      - ./observability/otel-collector-node.yaml:/etc/otel/config.yaml:ro
    networks:
      - bap_side
      - observability
    depends_on:
      otel-collector-network:
        condition: service_started

  otel-collector-sellerapp:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-sellerapp
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      OTEL_NODE_NAME: sellerapp
    volumes:
      - ./observability/otel-collector-node.yaml:/etc/otel/config.yaml:ro
    networks:
      - bpp_side
      - observability
    depends_on:
      otel-collector-network:
        condition: service_started

  otel-collector-ledger-buyerdiscom:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-ledger-buyerdiscom
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      OTEL_NODE_NAME: ledger-buyerdiscom
    volumes:
      - ./observability/otel-collector-node.yaml:/etc/otel/config.yaml:ro
    networks:
      - bap_side
      - observability
    depends_on:
      otel-collector-network:
        condition: service_started

  otel-collector-ledger-sellerdiscom:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-ledger-sellerdiscom
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      OTEL_NODE_NAME: ledger-sellerdiscom
    volumes:
      - ./observability/otel-collector-node.yaml:/etc/otel/config.yaml:ro
    networks:
      - bpp_side
      - observability
    depends_on:
      otel-collector-network:
        condition: service_started

  otel-collector-buyerdiscom:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-buyerdiscom
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      OTEL_NODE_NAME: buyerdiscom
    volumes:
      - ./observability/otel-collector-node.yaml:/etc/otel/config.yaml:ro
    networks:
      - bap_side
      - observability
    depends_on:
      otel-collector-network:
        condition: service_started

  otel-collector-sellerdiscom:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-sellerdiscom
    command: ["--config=/etc/otel/config.yaml"]
    environment:
      OTEL_NODE_NAME: sellerdiscom
    volumes:
      - ./observability/otel-collector-node.yaml:/etc/otel/config.yaml:ro
    networks:
      - bpp_side
      - observability
    depends_on:
      otel-collector-network:
        condition: service_started

  otel-collector-network:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector-network
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector-network.yaml:/etc/otel/config.yaml:ro
    networks:
      - observability

  prometheus:
    image: prom/prometheus:latest
    container_name: p2p-wave2-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
    depends_on:
      otel-collector-network:
        condition: service_started

  loki:
    image: grafana/loki:latest
    container_name: p2p-wave2-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability

  promtail:
    image: grafana/promtail:latest
    container_name: p2p-wave2-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - observability
    depends_on:
      loki:
        condition: service_started

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: p2p-wave2-zipkin
    ports:
      - "9411:9411"
    networks:
      - observability

  grafana:
    image: grafana/grafana:latest
    container_name: p2p-wave2-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3005
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3005:3000"
    networks:
      - observability
    depends_on:
      prometheus:
        condition: service_started
      loki:
        condition: service_started
      promtail:
        condition: service_started
      zipkin:
        condition: service_started

  # ---------- Host router (only container on both sides) ----------
  # Caddy listens on :9000 and routes by Host header. Network aliases below
  # give each Beckn participant its own resolvable hostname (buyer.beckn-router,
  # seller.beckn-router, sellerdiscom.beckn-router, buyerdiscom.beckn-router)
  # so containers can reach any participant by name. Each alias is declared on
  # both networks because callers live on either side and must resolve every
  # participant — Docker DNS only sees aliases on its own network.
  beckn-router:
    image: caddy:alpine
    container_name: beckn-router
    ports:
      - "9000:9000"
    networks:
      bap_side:
        aliases:
          - buyerapp.example.com
          - sellerapp.example.com
          - seller-discom-ledger.example.com
          - buyer-discom-ledger.example.com
          - sellerdiscom.example.com
          - buyerdiscom.example.com
      bpp_side:
        aliases:
          - buyerapp.example.com
          - sellerapp.example.com
          - seller-discom-ledger.example.com
          - buyer-discom-ledger.example.com
          - sellerdiscom.example.com
          - buyerdiscom.example.com
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile

networks:
  bap_side:
    driver: bridge
  bpp_side:
    driver: bridge
  observability:
    driver: bridge

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
