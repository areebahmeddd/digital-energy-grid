appName: "onix-ledger-local"
log:
  level: debug
  destinations:
    - type: stdout
  contextKeys:
    - transaction_id
    - message_id
    - subscriber_id
    - module_id
http:
  port: 8083
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins
modules:
  - name: ledgerTxnReceiver
    path: /ledger/receiver/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 30s
      plugins:
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: ledger.example.com
            keyId: 76EU7ledgerKeyIdMockForDevkitTestingOnly000000000000000000000000
            signingPrivateKey: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
            signingPublicKey: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
            encrPrivateKey: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
            encrPublicKey: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
        cache:
          id: cache
          config:
            addr: redis-ledger:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-trading-routing-Ledger-Receiver.yaml
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bpp
      steps:
        - validateSchema
        - addRoute

  - name: ledgerTxnCaller
    path: /ledger/caller/
    handler:
      type: std
      role: bpp
      httpClientConfig:
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 30s
      plugins:
        keyManager:
          id: simplekeymanager
          config:
            networkParticipant: ledger.example.com
            keyId: 76EU7ledgerKeyIdMockForDevkitTestingOnly000000000000000000000000
            signingPrivateKey: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
            signingPublicKey: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
            encrPrivateKey: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
            encrPublicKey: YWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWFhYWE=
        cache:
          id: cache
          config:
            addr: redis-ledger:6379
        router:
          id: router
          config:
            routingConfig: ./config/local-p2p-trading-routing-Ledger-Caller.yaml
        signer:
          id: signer
        middleware:
          - id: reqpreprocessor
            config:
              uuidKeys: transaction_id,message_id
              role: bpp
      steps:
        - validateSchema
        - addRoute
        - sign
