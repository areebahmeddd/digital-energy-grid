openapi: 3.1.1
info:
  title: EnergyResource — Resource Attributes (v2.0)
  version: 2.0.0
  description: >
    Item attributes for energy resources. Attached to Item.itemAttributes
    (or Resource.resourceAttributes for inter-discom P2P) to provide
    energy-specific characteristics including source type and meter
    identifiers.

components:
  schemas:
    EnergyResource:
      type: object
      additionalProperties: false
      x-tags:
        - energy-trade
        - p2p-trading
        - item
        - energy-resource
      x-jsonld:
        "@context": ./context.jsonld
        "@type": EnergyResource
      properties:

        sourceType:
          type: string
          enum: [SOLAR, BATTERY, GRID, HYBRID, RENEWABLE]
          description: >
            Type of energy source. Source verification occurs at onboarding
            but can change post-onboarding (e.g., switching from solar to
            diesel). Source type influences price but not workflow.
          example: "SOLAR"
          x-jsonld:
            "@id": sourceType

        meterId:
          type: string
          description: >
            Source meter identifier in DER address format
            (der://meter/{id}). Used for discovery and fulfillment tracking.
          example: "der://meter/100200300"
          x-jsonld:
            "@id": meterId
